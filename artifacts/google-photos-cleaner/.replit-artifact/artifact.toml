kind = "web"
previewPath = "/"
title = "Google Photos Cleaner"
version = "1.0.0"
id = "artifacts/google-photos-cleaner"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24218

[services.development]
run = "pnpm --filter @workspace/google-photos-cleaner run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/google-photos-cleaner", "run", "build" ]
publicDir = "artifacts/google-photos-cleaner/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24218"
BASE_PATH = "/"
